name: Release Gate

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run release:gate
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          RELEASE_GATE_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RELEASE_GATE_OFFLINE_SYNC_KEY: ${{ secrets.OFFLINE_SYNC_KEY }}
          RELEASE_GATE_OUTPUT_FORMAT: both
          RELEASE_GATE_OUTPUT_PATH: release-gate-report.json

      - name: Upload release gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-report
          path: release-gate-report.json
