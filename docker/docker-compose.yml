version: '3.8'

services:
  # Backend Node.js
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: centro_${CENTRO_ID:-default}_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/centro_${CENTRO_ID:-default}}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - CORS_ORIGINS=${CORS_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - RATE_LIMIT_MAX=500
      - RATE_LIMIT_LOGIN_MAX=20
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ../uploads:/app/uploads
      - ../logs:/app/logs
    depends_on:
      - mongo
    networks:
      - centro_network

  # Frontend React
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: centro_${CENTRO_ID:-default}_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=/api
      - REACT_APP_API_FALLBACK_PROXY=true
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - centro_network

  # MongoDB
  mongo:
    image: mongo:6-jammy
    container_name: centro_${CENTRO_ID:-default}_mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=centro_${CENTRO_ID:-default}
    volumes:
      - mongo_data:/data/db
      - ../scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "${MONGO_PORT:-27017}:27017"
    networks:
      - centro_network

  # Redis (para caché)
  redis:
    image: redis:7-alpine
    container_name: centro_${CENTRO_ID:-default}_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - centro_network

  # Backup automático
  backup:
    image: mongo:6-jammy
    container_name: centro_${CENTRO_ID:-default}_backup
    restart: unless-stopped
    volumes:
      - ../backups:/backups
      - ../scripts/backup.sh:/backup.sh:ro
    environment:
      - MONGO_HOST=mongo
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/centro_${CENTRO_ID:-default}}
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=30
    entrypoint: ["/bin/bash", "-c"]
    command: |
      'while true; do
        bash /backup.sh
        sleep 86400
      done'
    depends_on:
      - mongo
    networks:
      - centro_network

volumes:
  mongo_data:
  redis_data:

networks:
  centro_network:
    driver: bridge
